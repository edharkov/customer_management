name: Build and push service images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tagname:
        description: "Image tag (e.g. v1.0.0). If empty, commit SHA will be used."
        required: false
        default: ""

jobs:
  resolve-image-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
    steps:
      - name: Resolve image tag
        id: image_tag
        run: |
          COMMIT_TAG="${GITHUB_SHA::8}"
          TAG_INPUT="${{ github.event.inputs.tagname }}"
          if [ -z "$TAG_INPUT" ]; then
            TAG="$COMMIT_TAG"
          else
            TAG="${TAG_INPUT}-${COMMIT_TAG}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

  build-and-push-images:
    name: Build and push service images
    needs: resolve-image-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: customer-facing-web
            context: ./services/web
            dockerfile: ./services/web/Dockerfile
            image: obosecbot/customer-facing-web
          - component: customer-management-api
            context: ./services/management
            dockerfile: ./services/management/Dockerfile
            image: obosecbot/customer-management-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.resolve-image-tag.outputs.image_tag }}
            ${{ matrix.image }}:latest

  deploy:
    name: Deploy updated images
    runs-on: ubuntu-latest
    needs:
      - resolve-image-tag
      - build-and-push-images
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Login to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
          KUBE_CONTEXT: ${{ secrets.KUBE_CONTEXT }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "Missing secret KUBECONFIG_DATA"
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl config view --raw > /dev/null

          if [ -n "$KUBE_CONTEXT" ]; then
            kubectl config use-context "$KUBE_CONTEXT"
          fi

      - name: Patch images in deployments
        env:
          IMAGE_TAG: ${{ needs.resolve-image-tag.outputs.image_tag }}
        run: |
          echo "Deploying image tag ${IMAGE_TAG}"

          WEB_PATCH=$(cat <<EOF
[
  {"op":"replace","path":"/spec/template/spec/containers/0/image","value":"obosecbot/customer-facing-web:${IMAGE_TAG}"}
]
EOF
)
          MGMT_PATCH=$(cat <<EOF
[
  {"op":"replace","path":"/spec/template/spec/containers/0/image","value":"obosecbot/customer-management-api:${IMAGE_TAG}"}
]
EOF
)

          kubectl patch deployment customer-facing-web -n customer-system --type='json' -p "$WEB_PATCH"
          kubectl patch deployment customer-management -n customer-system --type='json' -p "$MGMT_PATCH"

          kubectl -n customer-system rollout status deployment/customer-facing-web --timeout=180s
          kubectl -n customer-system rollout status deployment/customer-management --timeout=180s
