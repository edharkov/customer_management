name: Build and push service images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tagname:
        description: "Image tag (e.g. v1.0.0). If empty, commit SHA will be used."
        required: false
        default: ""

jobs:
  build-and-push-images:
    name: Build and push service images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: customer-facing-web
            context: ./services/web
            dockerfile: ./services/web/Dockerfile
            image: obosecbot/customer-facing-web
          - component: customer-management-api
            context: ./services/management
            dockerfile: ./services/management/Dockerfile
            image: obosecbot/customer-management-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image_tag
        run: |
          COMMIT_TAG="${GITHUB_SHA::8}"
          TAG_INPUT="${{ github.event.inputs.tagname }}"
          if [ -z "$TAG_INPUT" ]; then
            TAG="$COMMIT_TAG"
          else
            TAG="${TAG_INPUT}-${COMMIT_TAG}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Built tag: $TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:${{ steps.image_tag.outputs.tag }}
