apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: customer-system
  labels:
    app: zookeeper
    role: messaging
    assignment-uuid: e271b052-9200-4502-b491-62f1649c07
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
        role: messaging
        assignment-uuid: e271b052-9200-4502-b491-62f1649c07
    spec:
      enableServiceLinks: false
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: customer-system
  labels:
    app: zookeeper
    role: messaging
    assignment-uuid: e271b052-9200-4502-b491-62f1649c07
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: customer-system
  labels:
    app: kafka
    role: messaging
    assignment-uuid: e271b052-9200-4502-b491-62f1649c07
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        role: messaging
        assignment-uuid: e271b052-9200-4502-b491-62f1649c07
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-zookeeper
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for zookeeper..."
              attempts=0
              until printf 'ruok' | nc -w 2 zookeeper 2181 | grep -q imok; do
                attempts=$((attempts + 1))
                if [ "$attempts" -gt 90 ]; then
                  echo "Timed out waiting for zookeeper health check."
                  exit 1
                fi
                sleep 2
              done
              echo "zookeeper is ready"
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.4.0
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "1"
          ports:
            - containerPort: 9092
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 5
            failureThreshold: 24
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: customer-system
  labels:
    app: kafka
    role: messaging
    assignment-uuid: e271b052-9200-4502-b491-62f1649c07
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
